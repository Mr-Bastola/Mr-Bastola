name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Purple Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Mr-Bastola
          outputs: |
            dist/purple-snake.svg?color_snake=#9933ff&color_dots=#161b22,#301e4a,#5d338a,#8146c9,#a559f8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Snake to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
