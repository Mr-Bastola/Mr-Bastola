name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Slow Purple Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Mr-Bastola
          outputs: |
            dist/github-snake.svg?color_snake=#9933ff&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353&speed=200
        # speed=200 is roughly 2x slower than the default. 
        # Increase to 300 if you want it even slower.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Snake to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
